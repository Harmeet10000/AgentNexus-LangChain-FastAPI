services:
  timescale:
    image: timescale/timescaledb-ha:pg18
    container_name: timescale_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-langchain_db}
      TS_TUNE_MEMORY: 2GB
    volumes:
      - timescale-data:/home/postgres/pgdata/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - langchain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - langchain-network
    restart: unless-stopped
    depends_on:
      - ai-service-1

  ai-service-1:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      target: dev
    container_name: ai-service-1
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    environment:
      ENVIRONMENT: development
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-your_secure_password}@timescale:5432/${POSTGRES_DB:-langchain_db}
    env_file:
      - .env.development
    networks:
      - langchain-network
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy

networks:
  langchain-network:
    driver: bridge

volumes:
  timescale-data:
  caddy-data:
  caddy-config:
